name: Trigger AWS Lambda via URL

on:
  push:
    branches:
      - main

jobs:
  call-lambda:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Lambda Function URL
        run: |
          curl -X POST "${{ secrets.LAMBDA_URL }}" \
          -H "Content-Type: application/json" \
          -d '{"event": "github_push", "repo": "${{ github.repository }}"}'
